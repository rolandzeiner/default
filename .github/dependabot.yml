version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 5
    groups:
      actions:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      actions-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 5
    groups:
      python-dev:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      pip-security:
        applies-to: security-updates
        patterns: ["*"]
